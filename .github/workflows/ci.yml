name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install ruff

      - name: Run ruff
        run: ruff check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install mypy

      - name: Run mypy
        run: mypy --strict *.py

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install pytest

      - name: Run tests
        run: pytest -v

  scan-secrets:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for private key material
        run: |
          status=0
          for pattern in 'PRIVATE KEY' 'BEGIN RSA' 'BEGIN EC' 'BEGIN DSA' 'BEGIN OPENSSH'; do
            if grep -r --include='*.py' --include='*.sh' --include='*.conf' --include='*.md' --include='*.json' -l "$pattern" . 2>/dev/null; then
              echo "::error::Found potential private key material matching '$pattern'"
              status=1
            fi
          done
          exit $status
