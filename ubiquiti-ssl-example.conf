#
# Example Ubiquiti SSL Certificate Deployment Configuration
#
# Copy this file and modify for your environment
#

# Domain name for the certificate
DOMAIN="gateway.example.com"

# Gateway connection details
GATEWAY_HOST="192.168.1.1"
SSH_USER="ubnt"
SSH_PORT="22"

# SSH authentication
SSH_KEY="/home/user/.ssh/ubiquiti_gateway"

# Gateway type (auto-detect if not specified)
GATEWAY_TYPE="auto"

# Logging
LOG_FILE="/var/log/ubiquiti-ssl-deploy.log"

# Deployment options
DRY_RUN="false"
VERBOSE="false"