#
# Ubiquiti SSL Certificate Deployment Configuration
#
# This file contains the configuration for deploying SSL certificates
# to Ubiquiti Cloud Gateway devices.
#
# Note: Command line arguments take precedence over values in this file
#

# Domain name for the certificate
# DOMAIN="example.com"

# Gateway connection details
# GATEWAY_HOST="192.168.1.1"
# SSH_USER="ubnt"
# SSH_PORT="22"

# SSH authentication (optional - uses system SSH config if not specified)
# SSH_KEY="/home/user/.ssh/id_rsa"

# Certificate file paths (defaults to Let's Encrypt paths if not specified)
# CERT_PATH="/etc/letsencrypt/live/$DOMAIN/fullchain.pem"
# KEY_PATH="/etc/letsencrypt/live/$DOMAIN/privkey.pem"
# CA_PATH="/etc/letsencrypt/live/$DOMAIN/chain.pem"

# Gateway type (auto-detect if not specified)
# Options: auto, unifi, cloudkey, edgeos, edge
# GATEWAY_TYPE="auto"

# Logging
# LOG_FILE="/var/log/ubiquiti-ssl-deploy.log"

# Deployment options
# DRY_RUN="false"
# VERBOSE="false"